<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Merit List - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { display: flex; font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .sidebar { width: 220px; height: 100vh; background: var(--primary); position: fixed; }
        .main { margin-left: 220px; flex: 1; padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .badge { background: #3498db; color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>🏆 Class Merit List</h1>
        <div class="card">
            <h3>Student Rankings by Class</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <select id="cls" style="padding:10px; border-radius:8px; flex:1;">
                    <option value="">-- Select Class --</option>
                    <option>Nursery</option><option>K.G.1</option><option>K.G.2</option>
                    <option>Basic 1</option><option>Basic 2</option><option>Basic 3</option>
                    <option>Basic 4</option><option>Basic 5</option><option>Basic 6</option>
                    <option>Basic 7</option><option>Basic 8</option><option>Basic 9</option>
                </select>
                <button onclick="load()" style="padding:10px 20px; background:#27ae60; color:white; border:none; border-radius:8px; cursor:pointer;">Generate Rankings</button>
            </div>
            <table id="table" style="display:none;">
                <thead><tr><th>Position</th><th>Name</th><th>Total Score</th><th>Average</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function load() {
            const cls = document.getElementById('cls').value;
            const data = await api.get('/academic/rankings/' + cls);
            document.getElementById('list').innerHTML = data.map(r => `
                <tr><td><span class="badge">${r.position}</span></td><td><b>${r.first_name} ${r.last_name}</b></td>
                <td>${r.total_score}</td><td>${parseFloat(r.average_score).toFixed(1)}%</td></tr>`).join('');
            document.getElementById('table').style.display = 'table';
        }
    </script>
</body>
</html>
