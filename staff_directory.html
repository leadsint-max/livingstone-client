<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Directory - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main { margin-left: 300px; padding: 30px; width: calc(100% - 310px); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .staff-photo { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; background: #eee; }
        .role-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>👨‍🏫 Staff & Teacher Directory</h1>
        <div id="loading" style="padding: 20px; color: #666;">Loading school staff...</div>
        <div class="grid" id="staffContainer"></div>
    </div>
    <script src="api.js"></script>
    <script>
        async function loadStaff() {
            const container = document.getElementById('staffContainer');
            try {
                const staff = await api.get('/staff');
                document.getElementById('loading').style.display = 'none';
                container.innerHTML = '';
                
                if (staff.length === 0) {
                    container.innerHTML = '<p>No staff registered yet.</p>';
                } else {
                    staff.forEach(s => {
                        const photo = s.photo || 'https://via.placeholder.com/70';
                        container.innerHTML += `
                            <div class="card">
                                <div style="display:flex; gap:15px; align-items:center; margin-bottom:15px;">
                                    <img src="${photo}" class="staff-photo">
                                    <div>
                                        <h3 style="margin:0;">${s.first_name} ${s.last_name}</h3>
                                        <span class="role-badge">${s.role}</span>
                                    </div>
                                </div>
                                <p style="font-size:0.9rem;"><b>Dept:</b> ${s.department}</p>
                                <p style="font-size:0.9rem;"><b>ID:</b> ${s.employee_id}</p>
                                <p style="font-size:0.8rem; color:#666; margin-top:10px;">${s.email}</p>
                                <button style="width:100%; margin-top:10px; cursor:pointer; padding:8px; border:1px solid #ddd; background:#fff; border-radius:5px;">View Profile</button>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                document.getElementById('loading').textContent = "Failed to load staff data.";
            }
        }
        window.onload = loadStaff;
    </script>
</body>
</html>
