<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Entry - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main { margin-left: 300px; padding: 30px; width: calc(100% - 310px); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        input { padding: 8px; width: 60px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>✍️ Record Academic Marks</h1>
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; margin-bottom:20px;">
                <select id="subjectSelect"><option>Loading Subjects...</option></select>
                <select id="examType"><option>Mid-Term</option><option>Final Exam</option></select>
                <button onclick="loadStudents()" style="background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer;">Load Class List</button>
            </div>

            <table id="marksTable">
                <thead><tr><th>Student Name</th><th>Admission No.</th><th>Score</th><th>Max</th><th>Remarks</th></tr></thead>
                <tbody id="studentList"></tbody>
            </table>
            <button class="btn-save" onclick="saveAllMarks()">💾 Save & Publish All Marks</button>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function setup() {
            const subs = await api.get('/subjects');
            const select = document.getElementById('subjectSelect');
            select.innerHTML = subs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }

        async function loadStudents() {
            const students = await api.get('/students');
            const tbody = document.getElementById('studentList');
            tbody.innerHTML = students.map(s => `
                <tr class="mark-row" data-id="${s.admission_no}">
                    <td>${s.first_name} ${s.last_name}</td>
                    <td>${s.admission_no}</td>
                    <td><input type="number" class="score-input" value="0"></td>
                    <td>100</td>
                    <td><input type="text" class="remarks-input" placeholder="Good" style="width:150px;"></td>
                </tr>
            `).join('');
        }

        async function saveAllMarks() {
            const rows = document.querySelectorAll('.mark-row');
            const marksList = Array.from(rows).map(row => ({
                studentId: row.getAttribute('data-id'),
                subjectId: document.getElementById('subjectSelect').value,
                examType: document.getElementById('examType').value,
                score: row.querySelector('.score-input').value,
                maxScore: 100,
                remarks: row.querySelector('.remarks-input').value
            }));

            const res = await api.post('/marks/save', { marksList });
            if (res.success) api.showNotification("Marks Saved Successfully!");
        }

        window.onload = setup;
    </script>
</body>
</html>
