<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Enter Scores - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; }
        body { display:flex; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .sidebar { width: 220px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main { margin-left: 220px; flex: 1; padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .controls { display: grid; grid-template-columns: 1.5fr 1.5fr 0.8fr; gap: 15px; margin-bottom: 25px; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .score-input { width: 70px; text-align: center; font-weight: bold; }
        /* Error Styling */
        .invalid { border: 2px solid var(--danger) !important; background: #fff5f5; color: var(--danger); }
        .error-hint { font-size: 0.7rem; color: var(--danger); display: block; margin-top: 2px; }
        .btn { background: #3498db; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>✍️ Mark Entry Portal</h1>
        <div class="card">
            <div class="controls">
                <select id="cls"><option value="">-- Class --</option><option>Nursery</option><option>Basic 1</option><option>Basic 2</option></select>
                <select id="sub"><option value="">-- Subject --</option></select>
                <button onclick="loadStudents()" class="btn">🔍 Load Students</button>
            </div>
            <table id="table" style="display:none;">
                <thead><tr><th>Student Name</th><th>Mid-Term (Max 30)</th><th>Final Exam (Max 70)</th><th>Remarks</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
            <button id="save" class="btn" style="display:none; background:var(--accent); width:100%; margin-top:20px;" onclick="save()">💾 Save All Marks</button>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function setup() {
            const subs = await api.get('/subjects');
            document.getElementById('sub').innerHTML += subs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }
        async function loadStudents() {
            const cls = document.getElementById('cls').value;
            const students = await api.get('/students/class/' + cls);
            document.getElementById('list').innerHTML = students.map(s => `
                <tr class="row" data-id="${s.admission_no}">
                    <td><b>${s.first_name} ${s.last_name}</b></td>
                    <td><input type="number" class="mid" value="0" min="0" max="30" oninput="validate(this, 30)"></td>
                    <td><input type="number" class="final" value="0" min="0" max="70" oninput="validate(this, 70)"></td>
                    <td><input type="text" class="rem" placeholder="Remarks"></td>
                </tr>`).join('');
            document.getElementById('table').style.display = 'table';
            document.getElementById('save').style.display = 'block';
        }
        function validate(input, max) {
            if (parseFloat(input.value) > max) { input.classList.add('invalid'); } 
            else { input.classList.remove('invalid'); }
        }
        async function save() {
            const invalids = document.querySelectorAll('.invalid');
            if (invalids.length > 0) { alert("Please correct the scores marked in red before saving."); return; }

            const list = [];
            document.querySelectorAll('.row').forEach(r => {
                const id = r.getAttribute('data-id');
                const subId = document.getElementById('sub').value;
                list.push({ studentId: id, subjectId: subId, examType: 'Mid-Term', score: r.querySelector('.mid').value, remarks: r.querySelector('.rem').value });
                list.push({ studentId: id, subjectId: subId, examType: 'Final Exam', score: r.querySelector('.final').value, remarks: r.querySelector('.rem').value });
            });
            const res = await api.post('/marks/save', { marksList: list });
            if (res.success) { api.showNotification("Marks Saved!"); location.reload(); }
        }
        window.onload = setup;
    </script>
</body>
</html>
