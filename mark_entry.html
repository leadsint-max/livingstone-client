<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enter Scores - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { display:flex; font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .sidebar { width: 220px; height: 100vh; background: var(--primary); position: fixed; }
        .main { margin-left: 220px; flex: 1; padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>✍️ Enter Examination Marks</h1>
        <div class="card">
            <div class="controls">
                <select id="cls"><option value="">-- Class --</option><option>Nursery</option><option>Basic 1</option><option>Basic 2</option></select>
                <select id="sub"><option>-- Subject --</option></select>
                <select id="type"><option>Mid-Term</option><option>Final Exam</option></select>
                <button onclick="loadList()" style="background:#3498db; color:white; border:none; border-radius:8px; cursor:pointer;">Load Students</button>
            </div>
            <table id="table" style="display:none;">
                <thead><tr><th>Student</th><th>ID</th><th>Score</th><th>Remarks</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
            <button id="save" class="btn-save" style="display:none;" onclick="save()">💾 Save All Marks</button>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function setup() {
            const subs = await api.get('/subjects');
            document.getElementById('sub').innerHTML += subs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }
        async function loadList() {
            const cls = document.getElementById('cls').value;
            const students = await api.get('/students/class/' + cls);
            const tbody = document.getElementById('list');
            tbody.innerHTML = students.map(s => `
                <tr class="row" data-id="${s.admission_no}">
                    <td><b>${s.first_name} ${s.last_name}</b></td>
                    <td>${s.admission_no}</td>
                    <td><input type="number" class="score" value="0"></td>
                    <td><input type="text" class="remarks" placeholder="Remarks"></td>
                </tr>`).join('') || '<tr><td colspan="4">No students found in this class.</td></tr>';
            document.getElementById('table').style.display = 'table';
            document.getElementById('save').style.display = 'block';
        }
        async function save() {
            const marksList = Array.from(document.querySelectorAll('.row')).map(r => ({
                studentId: r.getAttribute('data-id'),
                subjectId: document.getElementById('sub').value,
                examType: document.getElementById('type').value,
                term: "Term 1",
                score: parseFloat(r.querySelector('.score').value) || 0,
                remarks: r.querySelector('.remarks').value || "Good"
            }));
            const res = await api.post('/marks/save', { marksList });
            if (res.success) { api.showNotification("Marks Saved Successfully!"); location.reload(); }
        }
        window.onload = setup;
    </script>
</body>
</html>
