<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Entry - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #2980b9; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: var(--primary); color: white; position: fixed; padding: 20px; }
        .main { margin-left: 280px; padding: 30px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        input[type="number"] { width: 80px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-weight: bold; }
        .total-cell { background: #f8f9fa; color: var(--primary); font-weight: 800; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Livingstone</h2>
        <nav>
            <p><a href="admin_dashboard.html" style="color:white; text-decoration:none;">🏠 Dashboard</a></p>
            <p><a href="academic_overview.html" style="color:white; text-decoration:none;">📊 Academics</a></p>
            <p><b>✍️ Mark Entry</b></p>
        </nav>
    </div>
    <div class="main">
        <h1>✍️ Bulk Mark Entry</h1>
        <div class="card">
            <div class="header-controls">
                <div><label>Class</label><select><option>Grade 10 - A</option></select></div>
                <div><label>Subject</label><select><option>Mathematics</option></select></div>
                <div><label>Exam Type</label><select><option>Mid-Term (40%)</option><option>Final (60%)</option></select></div>
                <div><label>Term</label><select><option>Term 1</option><option>Term 2</option></select></div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Student ID</th>
                        <th>Obtained Score</th>
                        <th>Max Score</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>David Adeleke</td>
                        <td>LIS-2026-001</td>
                        <td><input type="number" value="38" step="0.5"></td>
                        <td class="total-cell">40</td>
                        <td><input type="text" placeholder="Excellent" style="width:100%; border:none; background:transparent;"></td>
                    </tr>
                    <tr>
                        <td>Samuel Okon</td>
                        <td>LIS-2026-002</td>
                        <td><input type="number" value="32" step="0.5"></td>
                        <td class="total-cell">40</td>
                        <td><input type="text" placeholder="Good work" style="width:100%; border:none; background:transparent;"></td>
                    </tr>
                    <tr>
                        <td>Jane Doe</td>
                        <td>LIS-2026-003</td>
                        <td><input type="number" value="18" step="0.5"></td>
                        <td class="total-cell">40</td>
                        <td><input type="text" placeholder="Needs improvement" style="width:100%; border:none; background:transparent;"></td>
                    </tr>
                </tbody>
            </table>

            <button class="btn-save" onclick="api.showNotification('Marks Saved and Published for Grade 10-A Mathematics')">Save & Publish All Marks</button>
        </div>
    </div>
    <script src="api.js"></script>
</body>
</html>
