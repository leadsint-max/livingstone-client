<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Admission - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; padding: 0; display: flex; flex-direction: column; }
        .main-content { margin-left: 300px; padding: 40px; width: 100%; max-width: 900px; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); margin-bottom: 25px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; color: #555; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        .btn-submit { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 20px; }
        .section-title { grid-column: span 2; margin-top: 20px; color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.85rem; }
        
        /* Camera Styles */
        #camera-container { width: 160px; height: 160px; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #canvas { display: none; }
        #photo-preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>
    <div class="sidebar"></div>

    <div class="main-content">
        <div class="form-card">
            <h2>New Student Admission</h2>
            <form id="admissionForm">
                <div class="form-grid">
                    <div class="section-title">Student Photo</div>
                    <div class="form-group" style="grid-column: span 2; display: flex; align-items: center; gap: 20px; background: #eee; padding: 20px; border-radius: 8px;">
                        <div id="camera-container">
                            <video id="video" autoplay playsinline></video>
                            <img id="photo-preview-img">
                            <canvas id="canvas" width="320" height="320"></canvas>
                        </div>
                        <div>
                            <button type="button" id="start-camera" style="padding:8px 12px;">🎥 Start Camera</button>
                            <button type="button" id="capture-photo" style="padding:8px 12px; display:none;">📸 Take Snapshot</button>
                            <p style="margin: 10px 0 5px; font-size: 0.8rem;">Or upload file:</p>
                            <input type="file" id="photo-upload" accept="image/*">
                            <input type="hidden" id="photo-data">
                        </div>
                    </div>

                    <div class="section-title">Personal Information</div>
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>
                    <div class="form-group">
                        <label>Admission Number</label>
                        <input type="text" id="admissionNo" placeholder="LIS-2026-0001" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Register Student</button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoPreview = document.getElementById('photo-preview-img');
        const startBtn = document.getElementById('start-camera');
        const captureBtn = document.getElementById('capture-photo');

        // 1. Camera Logic
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                startBtn.style.display = 'none';
                captureBtn.style.display = 'inline-block';
            } catch (err) {
                alert("Cannot access camera. Please check permissions.");
            }
        });

        captureBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 320, 320);
            const data = canvas.toDataURL('image/png');
            document.getElementById('photo-data').value = data;
            
            // Show preview
            video.style.display = 'none';
            photoPreview.src = data;
            photoPreview.style.display = 'block';
            api.showNotification("Photo Captured!");
        });

        // 2. Submission Logic
        document.getElementById('admissionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const studentData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                dob: document.getElementById('dob').value,
                admissionNo: document.getElementById('admissionNo').value,
                photo: document.getElementById('photo-data').value
            };

            const response = await api.post('/students/register', studentData);
            if (response.success) {
                api.showNotification('Student Registered Successfully!');
                setTimeout(() => window.location.href = 'student_list.html', 1500);
            } else {
                alert('Error: ' + response.error);
            }
        });
    </script>

</html>
