<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Admission - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main-content { margin-left: 300px; padding: 30px; width: 100%; max-width: 1000px; }
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-weight: bold; margin-bottom: 5px; color: #555; font-size: 0.9rem; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .section-title { grid-column: span 2; margin-top: 20px; border-bottom: 2px solid #eee; color: var(--accent); font-weight: bold; }
        .btn-submit { grid-column: span 2; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #photo-box { grid-column: span 2; display: flex; align-items: center; gap: 20px; background: #f9f9f9; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main-content">
        <div class="form-card">
            <h2>📝 New Student Admission</h2>
            <form id="admissionForm">
                <div class="form-grid">
                    <div id="photo-box">
                        <video id="video" width="120" height="120" autoplay playsinline style="border-radius:8px; background:#000;"></video>
                        <img id="photo-preview" style="display:none; width:120px; height:120px; border-radius:8px; object-fit:cover;">
                        <button type="button" id="snap" style="padding:10px;">📸 Snap Photo</button>
                        <input type="file" id="file-upload" accept="image/*">
                    </div>

                    <div class="section-title">Academic Placement</div>
                    <div class="form-group">
                        <label>Class / Grade</label>
                        <select id="className" required>
                            <option value="">-- Select Class --</option>
                            <option>Nursery</option>
                            <option>K.G.1</option>
                            <option>K.G.2</option>
                            <option>Basic 1</option>
                            <option>Basic 2</option>
                            <option>Basic 3</option>
                            <option>Basic 4</option>
                            <option>Basic 5</option>
                            <option>Basic 6</option>
                            <option>Basic 7</option>
                            <option>Basic 8</option>
                            <option>Basic 9</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Admission Number</label><input type="text" id="admissionNo" required></div>

                    <div class="section-title">Personal Details</div>
                    <div class="form-group"><label>First Name</label><input type="text" id="firstName" required></div>
                    <div class="form-group"><label>Last Name</label><input type="text" id="lastName" required></div>
                    <div class="form-group"><label>Date of Birth</label><input type="date" id="dob" required></div>
                    <div class="form-group"><label>Gender</label><select id="gender"><option>Male</option><option>Female</option></select></div>

                    <div class="section-title">Guardian Info</div>
                    <div class="form-group"><label>Parent Name</label><input type="text" id="parentName"></div>
                    <div class="form-group"><label>Parent Phone</label><input type="tel" id="parentPhone"></div>

                    <button type="submit" class="btn-submit">✅ Register Student</button>
                </div>
            </form>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        const video = document.getElementById('video');
        const snap = document.getElementById('snap');
        const photoPreview = document.getElementById('photo-preview');
        const fileUpload = document.getElementById('file-upload');
        let photoData = null;

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);
        
        snap.onclick = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 300; canvas.height = 300;
            canvas.getContext('2d').drawImage(video, 0, 0, 300, 300);
            photoData = canvas.toDataURL('image/png');
            video.style.display = 'none'; photoPreview.src = photoData; photoPreview.style.display = 'block';
        };

        fileUpload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => { photoData = reader.result; video.style.display = 'none'; photoPreview.src = photoData; photoPreview.style.display = 'block'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('admissionForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                dob: document.getElementById('dob').value,
                admissionNo: document.getElementById('admissionNo').value,
                className: document.getElementById('className').value,
                gender: document.getElementById('gender').value,
                parentName: document.getElementById('parentName').value,
                parentPhone: document.getElementById('parentPhone').value,
                photo: photoData
            };
            const res = await api.post('/students/register', data);
            if (res.success) { api.showNotification("Success!"); window.location.href='student_list.html'; }
            else { alert("Error: " + res.error); }
        };
    </script>
</body>
</html>
