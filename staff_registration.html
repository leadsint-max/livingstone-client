<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Registration - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main-content { margin-left: 300px; padding: 30px; width: 100%; max-width: 900px; }
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; }
        #photo-box { grid-column: span 2; display: flex; align-items: center; gap: 20px; background: #f9f9f9; padding: 15px; border-radius: 10px; }
        .btn-submit { grid-column: span 2; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main-content">
        <div class="form-card">
            <h2>👨‍🏫 Register New Staff Member</h2>
            <form id="staffForm">
                <div class="form-grid">
                    <div id="photo-box">
                        <video id="video" width="120" height="120" autoplay playsinline style="border-radius:50%; background:#000; object-fit:cover;"></video>
                        <img id="photo-preview" style="display:none; width:120px; height:120px; border-radius:50%; object-fit:cover;">
                        <button type="button" id="snap" style="padding:10px; cursor:pointer;">📸 Snap Photo</button>
                        <input type="file" id="file-upload" accept="image/*">
                    </div>
                    <div><label>Full Name</label><input type="text" id="fullName" required></div>
                    <div><label>Email Address</label><input type="email" id="email" required></div>
                    <div><label>System Role</label><select id="role"><option value="teacher">Teacher</option><option value="accountant">Accountant</option><option value="admin">Admin Assistant</option></select></div>
                    <div><label>Employee ID</label><input type="text" id="employeeId" required></div>
                    <div><label>Designation</label><input type="text" id="designation" placeholder="e.g. Senior Math Teacher"></div>
                    <div><label>Department</label><select id="department"><option>Mathematics</option><option>Science</option><option>Languages</option><option>Finance</option><option>Administration</option></select></div>
                    <button type="submit" class="btn-submit">✅ Hire & Register Staff</button>
                </div>
            </form>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        const video = document.getElementById('video');
        const snap = document.getElementById('snap');
        const photoPreview = document.getElementById('photo-preview');
        const fileUpload = document.getElementById('file-upload');
        let photoData = null;

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);
        
        snap.onclick = () => {
            const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
            canvas.getContext('2d').drawImage(video, 0, 0, 300, 300);
            photoData = canvas.toDataURL('image/png');
            video.style.display = 'none'; photoPreview.src = photoData; photoPreview.style.display = 'block';
        };

        document.getElementById('staffForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value,
                employeeId: document.getElementById('employeeId').value,
                designation: document.getElementById('designation').value,
                department: document.getElementById('department').value,
                photo: photoData
            };
            const res = await api.post('/staff/register', data);
            if (res.success) { api.showNotification("Staff Member Hired!"); window.location.href='staff_directory.html'; }
            else { alert("Error: " + res.error); }
        };
    </script>
</body>
</html>
