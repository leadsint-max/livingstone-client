<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Record Payment - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main { margin-left: 300px; padding: 30px; width: calc(100% - 310px); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; }
        .btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>💰 Record Student Payment</h1>
        <div class="card" style="max-width: 800px;">
            <h3>Payment Details (GH₵)</h3>
            <form id="paymentForm">
                <div class="form-row">
                    <div>
                        <label style="font-weight:bold; display:block; margin-bottom:5px;">Select Student</label>
                        <select id="studentSelect" required><option>Loading Students...</option></select>
                    </div>
                    <div>
                        <label style="font-weight:bold; display:block; margin-bottom:5px;">Fee Type</label>
                        <select id="feeType"><option>Tuition Fee</option><option>Admission Fee</option><option>Bus Fee</option><option>Uniform</option></select>
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label style="font-weight:bold; display:block; margin-bottom:5px;">Amount Paid (GH₵)</label>
                        <input type="number" id="amount" placeholder="0.00" required>
                    </div>
                    <div>
                        <label style="font-weight:bold; display:block; margin-bottom:5px;">Payment Method</label>
                        <select id="method"><option>Cash</option><option>Mobile Money (MoMo)</option><option>Bank Transfer</option><option>Cheque</option></select>
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label style="font-weight:bold; display:block; margin-bottom:5px;">Reference / ID</label>
                        <input type="text" id="reference" placeholder="e.g. TXN-99812">
                    </div>
                </div>
                <button type="submit" class="btn">✅ Save Payment & Update Dashboard</button>
            </form>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function setup() {
            const students = await api.get('/students/list-simple');
            const select = document.getElementById('studentSelect');
            select.innerHTML = students.map(s => `<option value="${s.admission_no}">${s.first_name} ${s.last_name} (${s.admission_no})</option>`).join('');
        }

        document.getElementById('paymentForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                studentId: document.getElementById('studentSelect').value,
                amount: document.getElementById('amount').value,
                feeType: document.getElementById('feeType').value,
                method: document.getElementById('method').value,
                reference: document.getElementById('reference').value
            };
            
            const res = await api.post('/payments/record', data);
            if (res.success) {
                api.showNotification("Payment Recorded GH₵ " + data.amount);
                setTimeout(() => window.location.href='admin_dashboard.html', 1500);
            } else {
                alert("Error: " + res.error);
            }
        };

        window.onload = setup;
    </script>
</body>
</html>
