<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Hub - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main { margin-left: 300px; padding: 30px; width: calc(100% - 310px); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-print { background: #27ae60; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>📊 Academic Merit & Report Center</h1>
        
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Class Merit List & Positions</h3>
                <select id="classFilter" onchange="loadRankings()" style="padding:10px; border-radius:5px;">
                    <option value="">-- Select Class --</option>
                    <option>Basic 1</option><option>Basic 2</option><option>Basic 3</option>
                </select>
            </div>
            <table>
                <thead>
                    <tr><th>Position</th><th>Student Name</th><th>Total Score</th><th>Action</th></tr>
                </thead>
                <tbody id="rankingsTable"></tbody>
            </table>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function loadRankings() {
            const cls = document.getElementById('classFilter').value;
            const container = document.getElementById('rankingsTable');
            const data = await api.get(`/academic/rankings/${cls}`);
            
            container.innerHTML = data.map(r => `
                <tr>
                    <td><b>${r.position}</b></td>
                    <td>${r.first_name} ${r.last_name}</td>
                    <td>${r.total_score || 0}</td>
                    <td><button class="btn-print" onclick="viewReport('${r.admission_no}')">🖨️ View Report</button></td>
                </tr>
            `).join('');
        }

        function viewReport(id) {
            localStorage.setItem('target_student_id', id);
            window.location.href = 'report_card_template.html';
        }
    </script>
</body>
</html>
