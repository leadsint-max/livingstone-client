<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merit Lists - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #8e44ad; --bg: #f4f7f6; }
        body { display: flex; font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .sidebar { width: 220px; height: 100vh; background: var(--primary); position: fixed; }
        .main { margin-left: 220px; flex: 1; padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .pos-badge { background: #3498db; color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>🏆 Class Merit Lists & Rankings</h1>
        <div class="card">
            <div style="display:flex; gap:15px; align-items:center;">
                <label>Select Class:</label>
                <select id="cls" style="padding:10px; border-radius:8px; width:200px;">
                    <option value="">-- Class --</option>
                    <option>Nursery</option><option>K.G.1</option><option>K.G.2</option>
                    <option>Basic 1</option><option>Basic 2</option><option>Basic 3</option>
                    <option>Basic 4</option><option>Basic 5</option><option>Basic 6</option>
                    <option>Basic 7</option><option>Basic 8</option><option>Basic 9</option>
                </select>
                <button onclick="load()" style="padding:10px 20px; background:#27ae60; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">🔍 Generate Merit List</button>
            </div>

            <table id="table" style="display:none;">
                <thead><tr><th>Position</th><th>Student Name</th><th>Total Score</th><th>Average</th><th>Action</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function load() {
            const cls = document.getElementById('cls').value;
            const data = await api.get('/academic/rankings/' + cls);
            const tbody = document.getElementById('list');
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td><span class="pos-badge">${r.position}</span></td>
                    <td><b>${r.first_name} ${r.last_name}</b></td>
                    <td>${r.total_score}</td>
                    <td>${parseFloat(r.average_score).toFixed(1)}%</td>
                    <td><button onclick="viewReport('${r.admission_no}')" style="font-size:0.75rem; cursor:pointer;">🖨️ View Report</button></td>
                </tr>`).join('') || '<tr><td colspan="5">No marks found for this class.</td></tr>';
            document.getElementById('table').style.display = 'table';
        }
        function viewReport(id) {
            localStorage.setItem('target_student_id', id);
            window.location.href = 'report_card_template.html';
        }
    </script>
</body>
</html>
