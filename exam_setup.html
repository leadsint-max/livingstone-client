<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Setup - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: var(--primary); color: white; position: fixed; padding: 20px; }
        .main { margin-left: 280px; padding: 30px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-row { display: grid; grid-template-columns: 2fr 1fr 1fr 0.5fr; gap: 15px; align-items: end; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Livingstone</h2>
        <nav>
            <p><a href="admin_dashboard.html" style="color:white; text-decoration:none;">🏠 Dashboard</a></p>
            <p><b>📝 Exam Setup</b></p>
            <p><a href="mark_entry.html" style="color:white; text-decoration:none;">✍️ Mark Entry</a></p>
            <p><a href="academic_overview.html" style="color:white; text-decoration:none;">📊 Academic Overview</a></p>
        </nav>
    </div>
    <div class="main">
        <h1>📝 Examination & Academic Setup</h1>
        
        <div class="card">
            <h3>Create New Exam Cycle</h3>
            <div class="form-row">
                <div><label>Exam Name</label><input type="text" placeholder="e.g. 2nd Term Finals"></div>
                <div><label>Term</label><select><option>Term 1</option><option>Term 2</option><option>Term 3</option></select></div>
                <div><label>Weight (%)</label><input type="number" placeholder="60"></div>
                <button class="btn" onclick="api.showNotification('Exam Cycle Created')">Save</button>
            </div>
        </div>

        <div class="card">
            <h3>Active Exam Cycles</h3>
            <table>
                <thead>
                    <tr><th>Exam Name</th><th>Term</th><th>Weight</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr><td>1st Term CAT 1</td><td>Term 1</td><td>20%</td><td><span style="color:green">Completed</span></td><td><button>View Results</button></td></tr>
                    <tr><td>1st Term Finals</td><td>Term 1</td><td>60%</td><td><span style="color:orange">Active (Entering Marks)</span></td><td><button>Enter Marks</button></td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="api.js"></script>
</body>
</html>
