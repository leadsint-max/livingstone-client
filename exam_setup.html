<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Setup - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main { margin-left: 300px; padding: 30px; width: calc(100% - 310px); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        input, select { padding: 10px; width: 100%; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>📝 Academic Year & Exam Setup</h1>
        <div class="card" style="max-width:500px;">
            <h3>Create Exam Cycle</h3>
            <label>Term Name</label>
            <select id="termName">
                <option>First Term</option><option>Second Term</option><option>Third Term</option>
            </select>
            <label>Exam Type</label>
            <select id="examType">
                <option>Mid-Term (CAT)</option><option>End of Term (Finals)</option>
            </select>
            <label>Weight (%)</label>
            <input type="number" id="weight" value="100">
            <button class="btn" onclick="api.showNotification('Exam Cycle Activated!')">✅ Activate Exam Cycle</button>
        </div>
    </div>
    <script src="api.js"></script>
</body>
</html>
