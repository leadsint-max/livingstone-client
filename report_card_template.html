<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Report Card</title>
    <style>
        body { font-family: 'Times New Roman', serif; padding: 40px; background: #999; }
        .report-card { background: white; width: 800px; margin: auto; padding: 50px; border: 10px double #2c3e50; }
        .header { text-align: center; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        .student-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        @media print { body { background: white; padding: 0; } .btn-print { display: none; } }
    </style>
</head>
<body>
    <div class="report-card" id="printArea">
        <div class="header">
            <h1 style="margin:0;">Livingstone Academy</h1>
            <p>Official Academic Performance Report</p>
        </div>
        <div class="student-meta" id="meta"></div>
        <table>
            <thead><tr><th>Subject</th><th>Score (100)</th><th>Grade</th><th>Remarks</th></tr></thead>
            <tbody id="marksBody"></tbody>
        </table>
    </div>
    <div style="text-align:center; margin-top:20px;">
        <button class="btn-print" onclick="window.print()" style="padding:10px 20px; cursor:pointer;">🖨️ Print Now</button>
    </div>

    <script src="api.js"></script>
    <script>
        async function loadReport() {
            const id = localStorage.getItem('target_student_id');
            const data = await api.get(`/academic/report/${id}`);
            
            document.getElementById('meta').innerHTML = `
                <div><b>Student:</b> ${data.student.first_name} ${data.student.last_name}</div>
                <div><b>Class:</b> ${data.student.class_name}</div>
                <div><b>Admission ID:</b> ${data.student.admission_no}</div>
            `;

            document.getElementById('marksBody').innerHTML = data.marks.map(m => {
                let grade = m.score >= 80 ? 'A' : (m.score >= 70 ? 'B' : 'C');
                return `<tr><td>${m.subject_name}</td><td>${m.score}</td><td>${grade}</td><td>${m.remarks}</td></tr>`;
            }).join('');
        }
        window.onload = loadReport;
    </script>
</body>
</html>
