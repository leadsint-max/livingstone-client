<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subject Management - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main { margin-left: 300px; padding: 30px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, select { padding: 10px; width: 100%; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>📚 Subject Management</h1>
        <div class="card" style="max-width:500px;">
            <h3>Add New Subject</h3>
            <label>Name</label><input type="text" id="subName" placeholder="e.g. Mathematics">
            <label>Code</label><input type="text" id="subCode" placeholder="e.g. MATH-101">
            <label>Department</label><select id="subDept"><option>Mathematics</option><option>Science</option><option>Languages</option></select>
            <button class="btn" onclick="addSubject()">➕ Save Subject</button>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function addSubject() {
            const data = { name: document.getElementById('subName').value, code: document.getElementById('subCode').value, department: document.getElementById('subDept').value };
            const res = await api.post('/subjects/add', data);
            if (res.success) { api.showNotification("Subject Added!"); location.reload(); }
            else { alert("Error: " + res.error); }
        }
    </script>
</body>
</html>
