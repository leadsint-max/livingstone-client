<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Directory - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: var(--primary); color: white; position: fixed; }
        .main { margin-left: 300px; padding: 30px; width: calc(100% - 310px); }
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .student-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .student-photo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #eee; }
        .student-card h3 { margin: 0; color: var(--primary); }
        .badge { background: #e1f5fe; color: #0288d1; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <h1>👨‍🎓 Real Student Directory</h1>
        <div class="student-grid" id="studentContainer">
            <p>Loading real-time student data...</p>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function loadStudents() {
            const container = document.getElementById('studentContainer');
            try {
                const students = await api.get('/students');
                container.innerHTML = '';
                if (students.length === 0) {
                    container.innerHTML = '<p>No students found. Register your first student!</p>';
                } else {
                    students.forEach(s => {
                        const photo = s.photo || 'https://via.placeholder.com/100';
                        container.innerHTML += `
                            <div class="student-card">
                                <img src="${photo}" class="student-photo">
                                <h3>${s.first_name} ${s.last_name}</h3>
                                <span class="badge">${s.class_name || 'No Class'}</span>
                                <p style="font-size:0.85rem; color:#666; margin-top:10px;">ID: ${s.admission_no}</p>
                                <p style="font-size:0.85rem; color:#666;">Parent: ${s.parent_phone || 'N/A'}</p>
                            </div>
                        `;
                    });
                }
            } catch (err) { container.innerHTML = '<p style="color:red">Failed to load data.</p>'; }
        }
        window.onload = loadStudents;
    </script>
</body>
</html>
