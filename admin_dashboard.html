<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #3498db; --bg: #f4f7f6; --sidebar-width: 280px; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { display: flex; background-color: var(--bg); height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--primary); color: white; display: flex; flex-direction: column; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid var(--accent); }
        .stat-card .label { color: #7f8c8d; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; display: block; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main-content">
        <h1>Welcome, Administrator</h1>
        <div class="stats-grid">
            <div class="stat-card"><span class="label">Total Students</span><div class="value" id="countStudents">...</div></div>
            <div class="stat-card"><span class="label">Total Staff</span><div class="value" id="countStaff">...</div></div>
            <div class="stat-card"><span class="label">Total Teachers</span><div class="value" id="countTeachers">...</div></div>
            <div class="stat-card" style="border-color:#e74c3c;"><span class="label">Pending Fees</span><div class="value" id="countFees" style="color:#e74c3c">GH₵ 0.00</div></div>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        async function loadStats() {
            try {
                const data = await api.get('/stats');
                document.getElementById('countStudents').textContent = data.totalStudents || 0;
                document.getElementById('countStaff').textContent = data.totalStaff || 0;
                document.getElementById('countTeachers').textContent = data.totalTeachers || 0;
                document.getElementById('countFees').textContent = "GH₵ " + (data.pendingFees || "0.00");
            } catch (err) { console.error("Stats failed"); }
        }
        window.onload = loadStats;
    </script>
</body>
</html>
