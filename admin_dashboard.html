<script src="api.js"></script>
<script>
    async function loadStats() {
        try {
            const data = await api.get('/stats');
            document.getElementById('countStudents').textContent = data.totalStudents || 0;
            document.getElementById('countStaff').textContent = data.totalStaff || 0;
            document.getElementById('countTeachers').textContent = data.totalTeachers || 0;
            
            // This updates the fee box with real data from the server
            const feeElement = document.querySelector('.financial .value');
            if (feeElement) {
                feeElement.textContent = "GH₵ " + (data.pendingFees || "0.00");
            }
        } catch (err) {
            console.error("Dashboard stats failed to load.");
        }
    }
    window.onload = loadStats;
</script>
