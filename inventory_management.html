<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory - Livingstone Academy</title>
    <style>
        :root { --primary: #2c3e50; --accent: #16a085; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: var(--primary); color: white; position: fixed; padding: 20px; }
        .main { margin-left: 280px; padding: 30px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .stock-tag { padding: 4px 8px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .low { background: #fdedec; color: #e74c3c; }
        .good { background: #eafaf1; color: #27ae60; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Livingstone</h2>
        <nav>
            <p><a href="admin_dashboard.html" style="color:white; text-decoration:none;">🏠 Dashboard</a></p>
            <p><b>📦 Inventory</b></p>
        </nav>
    </div>
    <div class="main">
        <h1>📦 Inventory & Assets</h1>
        <div class="card">
            <h3>Stock Levels</h3>
            <table style="width:100%; border-collapse: collapse;">
                <thead>
                    <tr style="text-align:left;"><th>Item Name</th><th>Category</th><th>Qty</th><th>Status</th></tr>
                </thead>
                <tbody>
                    <tr><td>Whiteboard Markers</td><td>Stationery</td><td>12</td><td><span class="stock-tag low">LOW STOCK</span></td></tr>
                    <tr><td>Desks (Wooden)</td><td>Furniture</td><td>450</td><td><span class="stock-tag good">OK</span></td></tr>
                    <tr><td>Calculators</td><td>Equipment</td><td>25</td><td><span class="stock-tag good">OK</span></td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="api.js"></script>
</body>
</html>
